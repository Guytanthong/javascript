<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <details>
        <summary>Counter</summary>
        <label id="display">
            0
        </label>
        <div id="btncontainer">
            <button id="increment" class="buttons">Increment</button>
            <button id="decrement" class="buttons">Decrement</button>
            <button id="reset" class="buttons">Reset</button>
        </div>
        <br>
        <label id="myLabel">0</label> <br>
        <button id="myButton">Roll</button>
    </details>
    
    <br>
    <details>
        <summary>Temperature conversion</summary>
        <form>
            <h1>Temperature Conversion:</h1>
            <input type="number" id="textbox" value="0"> <br>

            <input type="radio" id="toF" name="unit">
            <label for="toF" >Celcius To Fahrenheit</label> <br>

            <input type="radio" id="toC" name="unit">
            <label for="toC" >Fahrenheit To Celcius</label> <br>

            <button type="button" onclick = "convert()">submit</button>
            <p id="res">select a unit</p>
    </form>
    </details>
    <br>
    <details>
        <summary>Dice Roller</summary>
        <div id = "container">
            <h1>Dice Roller</h1>
            <label>number of dice:</label>
            <input type="number" id="numofDice" value = "1" min = "1">
            <button onclick="rollDice()">Roll Dice</button>
            <div id = "diceResult"></div>
            <div id = "diceimgs"></div>
        </div>
    </details>
    

    


    <script src="index.js"></script>
</body>

</html>
